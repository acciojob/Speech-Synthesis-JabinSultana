<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Speech Synthesis</title>
  <link href='https://fonts.googleapis.com/css?family=Pacifico' rel='stylesheet' type='text/css'>
  <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="voiceinator">

      <h1>The Voiceinator 5000</h1>

      <select name="voice" id="voices">
        <option value="">Select A Voice</option>
      </select>

      <label for="rate">Rate:</label>
      <input name="rate" type="range" min="0" max="3" value="1" step="0.1">

      <label for="pitch">Pitch:</label>

      <input name="pitch" type="range" min="0" max="2" step="0.1">
      <textarea name="text">Hello! I love JavaScript 👍</textarea>
      <button id="stop">Stop!</button>
      <button id="speak">Speak</button>

    </div>

<script>
  const msg = new SpeechSynthesisUtterance();
  let voices = [];
  const voicesDropdown = document.querySelector('[name="voice"]');
  const options = document.querySelectorAll('[type="range"], [name="text"]');
  const speakButton = document.querySelector('#speak');
  const stopButton = document.querySelector('#stop');

  //Your code goes here

// Get elements
const msg = new SpeechSynthesisUtterance();

const textInput = document.querySelector('textarea');
const voiceSelect = document.querySelector('select');

const speakButton = document.querySelector('#speak');
const stopButton = document.querySelector('#stop');

const rateSlider = document.querySelector('#rate');
const pitchSlider = document.querySelector('#pitch');

let voices = [];

// Load voices
function populateVoices() {

  voices = speechSynthesis.getVoices();

  voiceSelect.innerHTML = voices
    .map((voice, index) => {
      return `<option value="${index}">
                ${voice.name} (${voice.lang})
              </option>`;
    })
    .join('');
}

// Set selected voice
function setVoice() {

  const selectedIndex = voiceSelect.value;
  msg.voice = voices[selectedIndex];

  // Restart speech if already speaking
  if (speechSynthesis.speaking) {
    speechSynthesis.cancel();
    speechSynthesis.speak(msg);
  }
}

// Speak text
function speakText() {

  if (textInput.value.trim() === "") return;

  msg.text = textInput.value;

  speechSynthesis.cancel(); // stop previous
  speechSynthesis.speak(msg);
}

// Stop speech
function stopText() {

  speechSynthesis.cancel();
}

// Update rate
function updateRate() {

  msg.rate = rateSlider.value;

  if (speechSynthesis.speaking) {
    speechSynthesis.cancel();
    speechSynthesis.speak(msg);
  }
}

// Update pitch
function updatePitch() {

  msg.pitch = pitchSlider.value;

  if (speechSynthesis.speaking) {
    speechSynthesis.cancel();
    speechSynthesis.speak(msg);
  }
}

// Event Listeners
speechSynthesis.addEventListener('voiceschanged', populateVoices);

voiceSelect.addEventListener('change', setVoice);

speakButton.addEventListener('click', speakText);

stopButton.addEventListener('click', stopText);

rateSlider.addEventListener('input', updateRate);

pitchSlider.addEventListener('input', updatePitch);

</script>


</body>
</html>
